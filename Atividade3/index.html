<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tabuada</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <div class="container">
    <h1>Tabuada</h1>
    <p class="subtitulo">Digite um número e veja a tabuada completa de 1 a 10.</p>

    <div class="area-input">
      <input type="number" id="campo" placeholder="Digite um número..." />
      <button onclick="gerarTabuada()">Gerar</button>
    </div>
    <div id="resultado"></div>
  </div>

  <script src="script.js"></script>

</body>
</html>

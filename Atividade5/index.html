<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Soma da Série</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <div class="container">
    <h1>Soma da Série</h1>
    <p class="subtitulo">Digite a quantidade de termos para calcular: 1 + 11 + 111 + ...</p>

    <div class="area-input">
      <input type="number" id="campo" placeholder="Quantidade de termos..." min="1" />
      <button onclick="calcularSoma()">Calcular</button>
    </div>
    <div id="resultado"></div>
  </div>

  <script src="script.js"></script>

</body>
</html>
